<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Salario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        h1 {
            text-align: center;
            margin-top: 20px;
        }

        #buttonTelaInicial {
            float: left;
        }
    </style>
</head>
<body class="bg-light">
    <h1 class="text-success">Calculo do Salario do Funcionario</h1>

    <div class="container mt-5">
        <div class="card p-4">

            <h2 class="text-center mb-4">Informações do Funcionario</h2>

            <form action="/funcionario" method="post">
                <div class="mb-3 ">
                    Nome:
                    <input type="text" name="nome" class="form-control" required  placeholder="Digite Seu Nome:">
                </div>

                <div class="mb-3">
                    Quantidade de Horas:
                    <input type="number" name="qtdHoras" class="form-control" required placeholder="Digite a quantidade de horas:" step="0.1">
                </div>

                <div class="mb-3">
                    Quantidade de horas extras:
                    <input type="number" name="qtdHorasExtras" class="form-control" required placeholder="Digite a quantidade de Horas Extras:" step="0.1">
                </div>

                <div class="mb-3">
                    Valor por hora:
                    <input type="number" name="valorHora" class="form-control" required placeholder="Digite o valor por hora:" step="0.1">
                </div>
                
                <div class="mb-3">
                    Valor por hora extra:
                    <input type="number" name="valorHoraExtra" class="form-control" required placeholder="Digite o valor por hora extra" step="0.1">
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-danger">
                        Calcular Salario
                    </button>
                    <a href="/../index.html" class="btn btn-primary" id="buttonTelaInicial">
                        Tela Inicial
                    </a>
                </div>

                <div class="text-align">
                    
                </div>
            </form>
        </div>
    </div>
</body>
</html>
