<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Produtos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    h1 {
      text-align: center;
      color: rgb(185, 48, 48);
      margin-top: 20px;
    }

    h2 {
      color: rgb(185, 48, 48);
    }
    #buttonTelaInicial {
      float: left;
    }
  </style>
</head>

<body class="bg-light">

  <h1>Controle de Estoque</h1>

  <div class="container mt-5">
    <div class="card p-4">

      <h2 class="text-center mb-4">Cadastro de Produtos</h2>

      <form action="/produtos" method="post">

        <!-- PRODUTO 1 -->
        <h5 class="text-danger">Produto 1</h5>

        <input type="text" name="nome1" class="form-control mb-2" placeholder="Nome do produto" required>

        <input type="number" step="0.01" name="preco1" class="form-control mb-2" placeholder="Preço" required>

        <input type="number" name="entrada1" class="form-control mb-2" placeholder="Quantidade de entrada" required>

        <input type="number" name="saida1" class="form-control mb-4" placeholder="Quantidade de saída" required>


        <!-- PRODUTO 2 -->
        <h5 class="text-danger">Produto 2</h5>

        <input type="text" name="nome2" class="form-control mb-2" placeholder="Nome do produto">

        <input type="number" step="0.01" name="preco2" class="form-control mb-2" placeholder="Preço">

        <input type="number" name="entrada2" class="form-control mb-2" placeholder="Quantidade de entrada">

        <input type="number" name="saida2" class="form-control mb-4" placeholder="Quantidade de saída">


        <!-- PRODUTO 3 -->
        <h5 class="text-danger">Produto 3</h5>

        <input type="text" name="nome3" class="form-control mb-2" placeholder="Nome do produto">

        <input type="number" step="0.01" name="preco3" class="form-control mb-2" placeholder="Preço">

        <input type="number" name="entrada3" class="form-control mb-2" placeholder="Quantidade de entrada">

        <input type="number" name="saida3" class="form-control mb-4" placeholder="Quantidade de saída">


        <!-- PRODUTO 4 -->
        <h5 class="text-danger">Produto 4</h5>

        <input type="text" name="nome4" class="form-control mb-2" placeholder="Nome do produto">

        <input type="number" step="0.01" name="preco4" class="form-control mb-2" placeholder="Preço">

        <input type="number" name="entrada4" class="form-control mb-2" placeholder="Quantidade de entrada"> 

        <input type="number" name="saida4" class="form-control mb-4" placeholder="Quantidade de saída">


        <!-- PRODUTO 5 -->
        <h5 class="text-danger">Produto 5</h5>

        <input type="text" name="nome5" class="form-control mb-2" placeholder="Nome do produto">

        <input type="number" step="0.01" name="preco5" class="form-control mb-2" placeholder="Preço">

        <input type="number" name="entrada5" class="form-control mb-2" placeholder="Quantidade de entrada">

        <input type="number" name="saida5" class="form-control mb-4" placeholder="Quantidade de saída">


        <div class="text-end">
          <button type="submit" class="btn btn-danger">
            Calcular Estoque
          </button>
          <a href="/../index.html" class="btn btn-primary" id="buttonTelaInicial">
            Tela Inicial
          </a>
        </div>

      </form>

    </div>
  </div>

</body>
</html>
