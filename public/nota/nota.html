<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Notas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    h1 {
      text-align: center;
      color: rgb(24, 18, 212);
      margin-top: 20px;
    }

    h2 {
      color: rgb(24, 18, 212);
    }
    #buttonTelaInicial {
      float: left;
    }
  </style>
</head>

<body class="bg-light">

  <h1>Sistema de Notas</h1>

  <div class="container mt-5">
    <div class="card p-4">

      <h2 class="text-center mb-4">Informações do Aluno</h2>

      <form action="/nota" method="post">

        <div class="mb-3">
          Nome:
          <input type="text" name="nome" class="form-control" required placeholder="Seu nome aqui:">
        </div>

        <div class="mb-3">
          Nota 1:
          <input type="number" step="0.1" name="nota1" class="form-control" required placeholder="Exemplo: 8">
        </div>

        <div class="mb-3">
          Nota 2:
          <input type="number" step="0.1" name="nota2" class="form-control" required placeholder="Exemplo: 5">
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-primary">
            Calcular Média
          </button>
          <a href="/../index.html" class="btn btn-primary" id="buttonTelaInicial">
            Tela Inicial
          </a>
        </div>

      </form>

    </div>
  </div>

</body>
</html>
